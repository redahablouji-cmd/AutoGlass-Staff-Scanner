<!doctype html>
<html lang="en">
  <head>
  <meta charset="UTF-8" />
  
  <link rel="icon" type="image/png" href="/icon-192.png?v=2" />
  <link rel="apple-touch-icon" href="/icon-192.png?v=2" />
  <link rel="manifest" href="/manifest.json?v=2" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GlassTrack">

  <title>GlassTrack Pro</title>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then((reg) => {
              console.log('SW Registered!');
              reg.update(); // Force it to check for the new manifest
            })
            .catch(err => console.log('SW Failed:', err));
        });
      }
    </script>
  </body>
</html>
